name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/network-monitoring-system

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server metadata
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server
          tags: |
            type=raw,value=latest
            type=sha

      - name: Extract client metadata
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client
          tags: |
            type=raw,value=latest
            type=sha

      - name: Extract agent metadata
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agent
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_SOCKET_URL=
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./agent
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish-images
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_ORIGIN: ${{ secrets.CLIENT_ORIGIN }}
      SERVER_ID: ${{ secrets.SERVER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip deploy when secrets are missing
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_SSH_KEY == '' }}
        run: echo "Deployment secrets are not configured. Skipping remote deployment."

      - name: Prepare deployment environment file
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' }}
        run: |
          cat <<EOF > deploy.env
          SERVER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:latest
          CLIENT_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:latest
          AGENT_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agent:latest
          MONGO_URI=${{ env.MONGO_URI }}
          JWT_SECRET=${{ env.JWT_SECRET }}
          CLIENT_ORIGIN=${{ env.CLIENT_ORIGIN }}
          SERVER_ID=${{ env.SERVER_ID }}
          BACKEND_URL=http://server:5000
          EOF

      - name: Copy compose bundle to target host
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          source: docker-compose.yml,monitoring,deploy.env
          target: /opt/network-monitoring-system

      - name: Pull and restart services on target host
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/network-monitoring-system
            mv deploy.env .env
            docker compose pull
            docker compose up -d
